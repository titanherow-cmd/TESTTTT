name: Merge macros (optimized v3.32.2)

on:
  workflow_dispatch:
    inputs:
      enable_chat:
        description: 'Enable chat inserts (50% of files)'
        required: false
        default: false
        type: boolean
      use_whitelist:
        description: 'Use specific folders only (filter mode)'
        required: false
        default: true
        type: boolean
      versions:
        description: 'Total versions to generate *'
        required: true
        default: '6'
      target_minutes:
        description: 'Target duration per merged file *'
        required: true
        default: '35'

permissions:
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Get current BUNDLE_SEQ
        id: seq
        run: |
          if [ -f .github/merge_bundle_counter.txt ]; then
            VAL=$(cat .github/merge_bundle_counter.txt)
          else
            VAL=1
          fi
          echo "BUNDLE_SEQ=$VAL" >> "$GITHUB_ENV"
      
      - name: Display settings
        run: |
          echo "========================================"
          echo "MERGE MACROS v3.32.2"
          echo "========================================"
          echo "Bundle ID: ${{ env.BUNDLE_SEQ }}"
          echo "Versions: ${{ github.event.inputs.versions }}"
          echo "Target: ${{ github.event.inputs.target_minutes }} minutes"
          if [ "${{ inputs.enable_chat }}" = "true" ]; then
            echo "Chat: ENABLED (50% of files)"
          else
            echo "Chat: DISABLED"
          fi
          if [ "${{ inputs.use_whitelist }}" = "true" ]; then
            echo "Specific folders: ENABLED (filter mode)"
          else
            echo "Specific folders: DISABLED (all folders)"
          fi
          echo "========================================"
        
      - name: Execute macro merge script
        run: |
          mkdir -p output
          
          # Build command
          CMD="python3 merge_macros.py input_macros output"
          CMD="$CMD --versions ${{ github.event.inputs.versions }}"
          CMD="$CMD --target-minutes ${{ github.event.inputs.target_minutes }}"
          CMD="$CMD --bundle-id ${{ env.BUNDLE_SEQ }}"
          
          # Add --no-chat if disabled (default is disabled)
          if [ "${{ inputs.enable_chat }}" = "false" ]; then
            CMD="$CMD --no-chat"
          fi
          
          # Add --use-whitelist if enabled (default is enabled)
          if [ "${{ inputs.use_whitelist }}" = "true" ]; then
            CMD="$CMD --use-whitelist"
          fi
          
          # Execute
          echo "Running: $CMD"
          echo ""
          $CMD
            
      - name: Commit and Push Counter Update
        run: |
          NEW_VAL=$((BUNDLE_SEQ + 1))
          mkdir -p .github
          echo "$NEW_VAL" > .github/merge_bundle_counter.txt
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .github/merge_bundle_counter.txt
          git commit -m "Increment bundle counter to $NEW_VAL" || echo "No changes"
          git push || echo "Push failed"
            
      - name: Create ZIP artifact
        run: |
          BUNDLE_NAME="merged_bundle_${{ env.BUNDLE_SEQ }}"
          ZIP_FILE="merged_macros_${{ env.BUNDLE_SEQ }}.zip"
          
          echo "Creating ZIP from: output/$BUNDLE_NAME"
          ls -R output/
          
          if [ -d "output/$BUNDLE_NAME" ]; then
            cd output && zip -r "../$ZIP_FILE" "$BUNDLE_NAME"
            cd ..
            echo "✓ Created: $ZIP_FILE"
          else
            echo "✗ Error: Directory output/$BUNDLE_NAME was not found!"
            exit 1
          fi
          echo "FINAL_ZIP=$ZIP_FILE" >> "$GITHUB_ENV"
          
      - name: Upload merged ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: merged_macros_bundle_${{ env.BUNDLE_SEQ }}
          path: ${{ env.FINAL_ZIP }}
          retention-days: 90
